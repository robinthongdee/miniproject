<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="./output.css" rel="stylesheet">
    <title>Admin Dashboard - Stock Management</title>
</head>
<body class="bg-slate-900 text-slate-100 p-4 md:p-10">
    <div class="max-w-5xl mx-auto">
        <div class="flex justify-between items-center mb-8">
            <h1 class="text-3xl font-bold text-blue-400">ระบบหลังบ้านจัดการสต็อก</h1>
            <a href="index.html" class="text-slate-400 hover:text-white transition">← ไปหน้าเว็บหลัก</a>
        </div>

        <div class="bg-slate-800 border border-slate-700 p-6 rounded-2xl mb-10 shadow-lg">
            <h2 id="formTitle" class="text-xl font-semibold mb-4 text-blue-200">➕ เพิ่มรถเข้าสต็อก</h2>
            <form id="carForm" class="flex flex-col gap-4">
                <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                    <input type="text" id="brand" placeholder="ยี่ห้อและรุ่น" required class="bg-slate-700 border-none rounded-lg p-3 focus:ring-2 focus:ring-blue-500 text-white">
                    <input type="number" id="year" placeholder="ปี" required class="bg-slate-700 border-none rounded-lg p-3 focus:ring-2 focus:ring-blue-500 text-white">
                    <input type="number" id="price" placeholder="ราคา (บาท)" required class="bg-slate-700 border-none rounded-lg p-3 focus:ring-2 focus:ring-blue-500 text-white">
                </div>
                
                <div class="grid grid-cols-1 md:grid-cols-4 gap-4">
                    <input type="text" id="image_url" placeholder="URL รูปภาพรถ" class="md:col-span-2 bg-slate-700 border-none rounded-lg p-3 focus:ring-2 focus:ring-blue-500 text-white">
                    <button type="submit" id="submitBtn" class="bg-blue-600 hover:bg-blue-500 font-bold rounded-lg transition duration-300 py-3 active:scale-95">
                        บันทึกสต็อก
                    </button>
                    <button type="button" id="cancelEdit" class="hidden bg-slate-600 hover:bg-slate-500 font-bold rounded-lg transition duration-300 py-3">
                        ยกเลิกแก้ไข
                    </button>
                </div>
                <input type="hidden" id="editId">
            </form>
        </div>

        <div class="bg-slate-800 border border-slate-700 rounded-2xl overflow-hidden shadow-xl">
            <table class="w-full text-left">
                <thead class="bg-slate-700/50 text-slate-400 uppercase text-xs font-bold">
                    <tr>
                        <th class="p-4">รายละเอียดรถ</th>
                        <th class="p-4">ราคา</th>
                        <th class="p-4 text-right">จัดการ</th>
                    </tr>
                </thead>
                <tbody id="adminTableBody">
                    </tbody>
            </table>
        </div>
    </div>

    <script type="module" src="./admin.js"></script>
</body>
</html>
