<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="./output.css" rel="stylesheet">
    <title>Carhand2 | ตลาดรถมือสองคุณภาพ</title>
</head>
<body class="bg-slate-950 text-slate-200 min-h-screen pb-20 selection:bg-blue-500/30">

    <nav class="bg-slate-900/60 backdrop-blur-xl border-b border-white/5 sticky top-0 z-50 transition-all duration-300">
        <div class="max-w-6xl mx-auto px-4 md:px-6">
            <div class="flex justify-between h-20 items-center">
                <div class="flex items-center gap-3 group cursor-pointer" onclick="window.scrollTo({top:0, behavior:'smooth'})">
                    <div class="bg-blue-600 p-2 rounded-xl shadow-lg shadow-blue-600/20 group-hover:rotate-12 transition-transform">
                        <span class="text-2xl">🚗</span>
                    </div>
                    <span class="text-2xl font-black tracking-tighter bg-gradient-to-r from-white to-slate-400 bg-clip-text text-transparent">
                        CARHAND2
                    </span>
                </div>

                <div class="hidden md:flex items-center gap-8">
                    <div class="flex gap-6 text-sm font-bold uppercase tracking-widest text-slate-400">
                        <a href="index.html" class="text-blue-400 border-b-2 border-blue-400 pb-1">Home</a>
                        <a href="#" class="hover:text-white transition">Inventory</a>
                        <a href="#" class="hover:text-white transition">Contact</a>
                    </div>
                    <div class="h-8 w-[1px] bg-white/10 mx-2"></div>
                    <a href="admin.html" class="group relative flex items-center gap-2 bg-white text-slate-950 px-6 py-2.5 rounded-full text-sm font-black transition active:scale-95 overflow-hidden">
                        <span class="relative z-10">ADMIN PANEL</span>
                        <div class="absolute inset-0 bg-blue-400 translate-y-full group-hover:translate-y-0 transition-transform duration-300"></div>
                    </a>
                </div>

                <button id="mobile-menu-btn" class="md:hidden p-2 text-slate-400 hover:text-white focus:outline-none transition-colors">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-7 w-7" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path id="menu-icon" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16m-7 6h7" />
                    </svg>
                </button>
            </div>
        </div>

        <div id="mobile-menu" class="hidden md:hidden border-t border-white/5 bg-slate-900/90 backdrop-blur-2xl animate-in slide-in-from-top duration-300">
            <div class="px-6 py-8 flex flex-col gap-6 text-center">
                <a href="index.html" class="text-blue-400 font-black text-xl tracking-widest uppercase">Home</a>
                <a href="#" class="text-slate-400 font-bold hover:text-white transition text-lg uppercase tracking-widest">Inventory</a>
                <a href="#" class="text-slate-400 font-bold hover:text-white transition text-lg uppercase tracking-widest">Contact</a>
                <div class="h-[1px] bg-white/5 my-2"></div>
                <a href="admin.html" class="bg-blue-600 text-white py-4 rounded-2xl font-black tracking-widest shadow-lg shadow-blue-600/20 active:scale-95 transition">
                    GO TO ADMIN PANEL
                </a>
            </div>
        </div>
    </nav>

    <main class="max-w-6xl mx-auto px-4 md:px-6 mt-10">
        <section class="relative group">
            <div class="absolute -inset-1 bg-gradient-to-r from-blue-600 to-indigo-600 rounded-[2rem] blur opacity-10 group-hover:opacity-20 transition duration-1000"></div>
            <div class="relative bg-slate-900/50 border border-white/5 p-8 rounded-[2rem] mb-12 shadow-2xl backdrop-blur-md">
                <div class="flex items-center gap-3 mb-8">
                    <div class="w-10 h-10 bg-blue-500/20 rounded-full flex items-center justify-center text-blue-400 ring-4 ring-blue-500/5">
                        <span class="text-lg">📊</span>
                    </div>
                    <div>
                        <h2 class="text-xl font-black text-white uppercase tracking-tight">Finance Calculator</h2>
                        <p class="text-slate-500 text-xs font-medium">คำนวณค่างวดเบื้องต้นเพื่อประกอบการตัดสินใจ</p>
                    </div>
                </div>
                
                <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
                    <div class="space-y-2.5">
                        <label class="text-[10px] font-black text-slate-500 uppercase tracking-widest ml-1">Car Price (THB)</label>
                        <input type="number" id="calcPrice" placeholder="0.00" class="w-full bg-slate-950/50 border border-white/5 rounded-2xl p-4 outline-none focus:ring-2 focus:ring-blue-500/50 focus:border-blue-500/50 text-white font-bold transition">
                    </div>
                    <div class="space-y-2.5">
                        <label class="text-[10px] font-black text-slate-500 uppercase tracking-widest ml-1">Down Payment</label>
                        <input type="number" id="calcDown" placeholder="0.00" class="w-full bg-slate-950/50 border border-white/5 rounded-2xl p-4 outline-none focus:ring-2 focus:ring-blue-500/50 focus:border-blue-500/50 text-white font-bold transition">
                    </div>
                    <div class="space-y-2.5">
                        <label class="text-[10px] font-black text-slate-500 uppercase tracking-widest ml-1">Interest Rate (%)</label>
                        <input type="number" id="calcRate" placeholder="2.50" class="w-full bg-slate-950/50 border border-white/5 rounded-2xl p-4 outline-none focus:ring-2 focus:ring-blue-500/50 focus:border-blue-500/50 text-white font-bold transition">
                    </div>
                </div>

                <div id="resultMonthly" class="relative overflow-hidden group/btn cursor-default bg-slate-950 border border-white/5 p-6 rounded-2xl flex flex-col items-center justify-center transition-all duration-500">
                    <div class="absolute inset-0 bg-blue-600/5 opacity-0 group-hover/btn:opacity-100 transition-opacity"></div>
                    <span class="text-slate-500 text-[10px] font-bold uppercase tracking-[0.2em] mb-1">Estimated Monthly Payment</span>
                    <div class="text-3xl font-black text-blue-400 group-hover/btn:scale-105 transition-transform">
                        ฿0 <span class="text-sm font-medium text-slate-600">/ เดือน</span>
                    </div>
                </div>
            </div>
        </section>

        <div class="mb-10 relative group">
            <div class="absolute inset-y-0 left-5 flex items-center pointer-events-none text-slate-500 group-focus-within:text-blue-400 transition-colors">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
                </svg>
            </div>
            <input type="text" id="userSearch" placeholder="ค้นหายี่ห้อรถ, รุ่นรถ หรือปีที่ผลิต..." 
                class="w-full bg-slate-900 border border-white/5 rounded-2xl py-5 pl-14 pr-6 focus:ring-2 focus:ring-blue-500/20 focus:border-blue-500/20 outline-none shadow-2xl transition-all placeholder:text-slate-600 font-medium">
        </div>

        <div class="bg-slate-900/50 rounded-[2rem] border border-white/5 overflow-hidden shadow-2xl backdrop-blur-sm">
            <div class="overflow-x-auto">
                <table class="w-full text-left min-w-[700px]">
                    <thead>
                        <tr class="bg-white/5 text-slate-400 text-[10px] uppercase font-black tracking-[0.2em]">
                            <th class="p-6">Thumbnail</th>
                            <th class="p-6">Description</th>
                            <th class="p-6">Market Price</th>
                            <th class="p-6">Status</th>
                            <th class="p-6 text-right">Action</th>
                        </tr>
                    </thead>
                    <tbody id="carTableBody" class="divide-y divide-white/5">
                        <tr id="tableLoading">
                            <td colspan="5" class="p-20 text-center">
                                <div class="animate-pulse flex flex-col items-center gap-3">
                                    <div class="text-4xl text-slate-700">🕒</div>
                                    <span class="text-slate-600 font-bold uppercase tracking-widest text-xs">กำลังโหลดสต็อกรถล่าสุด...</span>
                                </div>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </main>

    <script>
        const menuBtn = document.getElementById('mobile-menu-btn');
        const mobileMenu = document.getElementById('mobile-menu');
        const menuIcon = document.getElementById('menu-icon');

        menuBtn.addEventListener('click', () => {
            const isHidden = mobileMenu.classList.toggle('hidden');
            
            // สลับไอคอนระหว่าง 3 ขีด (Hamburger) กับ กากบาท (X)
            if (isHidden) {
                menuIcon.setAttribute('d', 'M4 6h16M4 12h16m-7 6h7');
            } else {
                menuIcon.setAttribute('d', 'M6 18L18 6M6 6l12 12');
            }
        });

        // ปิดเมนูอัตโนมัติเมื่อมีการคลิกลิงก์
        mobileMenu.querySelectorAll('a').forEach(link => {
            link.addEventListener('click', () => {
                mobileMenu.classList.add('hidden');
                menuIcon.setAttribute('d', 'M4 6h16M4 12h16m-7 6h7');
            });
        });
    </script>

    <script type="module" src="./app.js"></script>
</body>
</html>
